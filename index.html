/* Version conteneur défilant */
.main-wrapper {
    width: 100%;
    max-height: 90vh; /* Limite la hauteur de la boîte sur l'écran */
    max-width: 450px;
    overflow-y: auto; /* Active le défilement (scroll) */
    background-color: #ffffff;
    border-radius: 15px;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    padding: 10px;
}

/* Le rectangle blanc intérieur */
.container {
    width: 100%;
    background: #ffffff;
    padding: 20px;
    text-align: center;
}

h1 {
    font-size: 24px;
    color: #0b355c;
    margin-bottom: 10px;
}

.description {
    font-size: 14px;
    color: #555555;
    margin-bottom: 20px;
}

.prix {
    font-size: 32px;
    font-weight: bold;
    color: #e01a22;
    margin-bottom: 25px;
}

/* Style de la zone de l'iframe */
.form-container {
    width: 100%;
    height: 560px; /* Aligné sur la hauteur de ton Google Form */
    margin-bottom: 20px;
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #ddd;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Style du bouton Wave tout en bas */
.btn-wave {
    display: block;
    width: 100%;
    background-color: #1ca1f2;
    color: white;
    text-decoration: none;
    padding: 14px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
    margin-top: 20px;
    border: none;
}

.btn-wave:hover {
    background-color: #1580c4;
}

.footer {
    font-size: 11px;
    color: #777777;
    margin-top: 20px;
    line-height: 1.4;
}

/* Barre de défilement discrète */
.main-wrapper::-webkit-scrollbar {
    width: 6px;
}
.main-wrapper::-webkit-scrollbar-thumb {
    background-color: #cccccc;
    border-radius: 3px;
}
</style>
</head>
<body>

<div class="main-wrapper">
    
    <div class="container">
